name: Release Trigger

on:
  push:
    branches:
      - main
    paths:
      - .github/version-manifest.yaml
  workflow_dispatch:

jobs:
  parse-version-manifest:
    runs-on: ubuntu-latest
    outputs: 
      dependencies: ${{ steps.parse_manifest.outputs.dependencies }}
      version: ${{ steps.parse_manifest.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version manifest
        id: parse_manifest
        run: |
          # Install yq for YAML parsing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          manifest_json=$(yq eval '.dependencies[]' .github/version-manifest.yaml -o json)
          echo "manifest_json=$manifest_json"

          dependencies=$(echo $manifest_json | jq -s '[.[] | to_entries[] | {name: .key, repo: .value.repo, version: .value.version}]')
          echo "dependencies=$dependencies"
          echo "$dependencies" | jq .

          dependencies=$(echo $dependencies | tr -d '\n')
          echo "dependencies=$dependencies" >> $GITHUB_OUTPUT
          
          VERSION=$(yq eval '.parent.version' .github/version-manifest.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Log outputs
        run: |
          echo "Version: ${{ steps.parse_manifest.outputs.version }}"
          echo "Dependencies: ${{ steps.parse_manifest.outputs.dependencies }}"

  tag-dependencies:
    runs-on: ubuntu-latest
    needs: parse-version-manifest
    strategy:
      matrix:
        dependency: ${{ fromJson(needs.parse-version-manifest.outputs.dependencies) }}
    steps:
      - name: Log dependency information
        run: |
          echo "Running jon for ${{ matrix.dependency.name }} at ${{matrix.dependency.repo }} with version ${{ matrix.dependency.version }}"
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ matrix.dependency.repo }}
      
      - name: Get latest commit SHA
        id: get_commit_sha
        run: |
          ls  -la
          echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_sha=$(git rev-parse HEAD)"

        
      # - name: Create tag
      #   id: create_tag
      #   run: |
      #     curl -s -L \
      #       -X POST \
      #       -H "Accept: application/vnd.github+json" \
      #       -H "Authorization: Bearer ${{secrets.MY_GITHUB_TOKEN}}" \
      #       -H "X-GitHub-Api-Version: 2022-11-28" \
      #       https://api.github.com/repos/${{matrix.dependency.repo}}/git/tags \
      #       -d '{"tag": "${{ matrix.dependency.version }}",
      #       "message": "version ${{ matrix.dependency.version }}",
      #       "object": "${{ steps.get_commit_sha.outputs.commit_sha }}",
      #       "type": "commit"
      #       }'

      # - name: Push tag v2
      #   continue-on-error: true
      #   if: always()  # Ensure this runs even if the previous step fails
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}  # or use MY_GH_PAT
      #     TARGET_REPO: ${{ matrix.dependency.repo }}  # Replace with actual repo name
