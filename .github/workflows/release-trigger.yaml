      # - name: Push tag v3
      #   continue-on-error: true
      #   if: always()  # Ensure this runs even if the previous step fails
      #   env:
      #     GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}  # or use MY_GH_PAT
      #   run: |
      #     gh api \
      #       --method POST \
      #       -H "Accept: application/vnd.github+json" \
      #       -H "X-GitHub-Api-Version: 2022-11-28" \
      #       /repos/${{ matrix.dependency.repo }}/git/refs \
      #       -f ref='refs/tags/${{ matrix.dependency.version }}' \
      #       -f sha="$(gh api /repos/${{ matrix.dependency.repo }}/git/refs/heads/main --jq '.object.sha')"

      - name: Push tag v4
        continue-on-error: true
        if: always()  # Ensure this runs even if the previous step fails
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}  # or use MY_GH_PAT
          TARGET_REPO: ${{ matrix.dependency.repo }}  # Replace with actual repo name
          TAG_NAME: "${{ matrix.dependency.version }}"
        run: |
          set -e

          echo "Getting latest commit SHA from main branch..."
          COMMIT_SHA=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${TARGET_REPO}/git/refs/heads/main \
            | jq -r '.object.sha')

          if [ "$COMMIT_SHA" = "null" ] || [ -z "$COMMIT_SHA" ]; then
            echo "❌ Failed to get commit SHA from main branch"
            exit 1
          fi

          echo "Latest commit SHA: $COMMIT_SHA"
          echo "Creating tag ${TAG_NAME} in repository ${TARGET_REPO}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${TARGET_REPO}/git/refs \
          -d "{
            \"ref\": \"refs/tags/${TAG_NAME}\",
            \"sha\": \"$COMMIT_SHA\"
          }")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)  
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $RESPONSE_BODY"
          
          case $HTTP_STATUS in
            201)
              echo "✅ Tag ${TAG_NAME} created successfully!"
              ;;
            422)
              # Check if it's because tag already exists
              if echo "$RESPONSE_BODY" | jq -e '.message' | grep -q "already exists"; then
                echo "ℹ️ Tag ${TAG_NAME} already exists - moving on."
              else
                echo "❌ Failed to create tag: $(echo "$RESPONSE_BODY" | jq -r '.message')"
                exit 1
              fi
              ;;
            *)
              echo "❌ Unexpected error creating tag (HTTP $HTTP_STATUS)"
              echo "Response: $RESPONSE_BODY"
              exit 1
              ;;
          esac
        
          echo "✅ ${TARGET_REPO} tagged successfully with tag ${TAG_NAME}!"