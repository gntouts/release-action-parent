name: Release Trigger

on:
  push:
    branches:
      - main
    paths:
      - .github/version-manifest.yaml
  workflow_dispatch:
env:
  DEPENDENCY_WORKFLOW: 'parent-release.yaml'

jobs:
  parse-version-manifest:
    runs-on: ubuntu-latest
    outputs: 
      dependencies: ${{ steps.parse_manifest.outputs.dependencies }}
      version: ${{ steps.parse_manifest.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version manifest
        id: parse_manifest
        run: |
          # Install yq for YAML parsing
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          manifest_json=$(yq eval '.dependencies[]' .github/version-manifest.yaml -o json)
          echo "manifest_json=$manifest_json"

          dependencies=$(echo $manifest_json | jq -s '[.[] | to_entries[] | {name: .key, repo: .value.repo, version: .value.version}]')
          echo "dependencies=$dependencies"
          echo "$dependencies" | jq .

          dependencies=$(echo $dependencies | tr -d '\n')
          echo "dependencies=$dependencies" >> $GITHUB_OUTPUT
          
          VERSION=$(yq eval '.parent.version' .github/version-manifest.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION"

      - name: Log outputs
        run: |
          echo "Version: ${{ steps.parse_manifest.outputs.version }}"
          echo "Dependencies: ${{ steps.parse_manifest.outputs.dependencies }}"

  tag-dependencies:
    runs-on: ubuntu-latest
    needs: parse-version-manifest
    strategy:
      matrix:
        dependency: ${{ fromJson(needs.parse-version-manifest.outputs.dependencies) }}
    steps:
      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}  # or use MY_GH_PAT
          TARGET_REPO: ${{ matrix.dependency.repo }}  # Replace with actual repo name
          TAG_NAME: "${{ matrix.dependency.version }}"
        run: |
          set -e

          echo "Getting latest commit SHA from main branch..."
          COMMIT_SHA=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${TARGET_REPO}/git/refs/heads/main \
            | jq -r '.object.sha')

          if [ "$COMMIT_SHA" = "null" ] || [ -z "$COMMIT_SHA" ]; then
            echo "❌ Failed to get commit SHA from main branch"
            exit 1
          fi

          echo "Latest commit SHA: $COMMIT_SHA"
          echo "Creating tag ${TAG_NAME} in repository ${TARGET_REPO}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${TARGET_REPO}/git/refs \
          -d "{
            \"ref\": \"refs/tags/${TAG_NAME}\",
            \"sha\": \"$COMMIT_SHA\"
          }")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)  
          echo "HTTP Status: $HTTP_STATUS"          
          case $HTTP_STATUS in
            201)
              echo "✅ Tag ${TAG_NAME} created successfully!"
              ;;
            422)
              # Check if it's because tag already exists
              if echo "$RESPONSE_BODY" | jq -e '.message' | grep -q "already exists"; then
                echo "ℹ️ Tag ${TAG_NAME} already exists - moving on."
              else
                echo "❌ Failed to create tag: $(echo "$RESPONSE_BODY" | jq -r '.message')"
                exit 1
              fi
              ;;
            *)
              echo "❌ Unexpected error creating tag (HTTP $HTTP_STATUS)"
              echo "Response: $RESPONSE_BODY"
              exit 1
              ;;
          esac
        
          echo "✅ ${TARGET_REPO} tagged successfully with tag ${TAG_NAME}!"

  tag-parent:
    runs-on: ubuntu-latest
    needs: [parse-version-manifest, tag-dependencies]
    if: needs.parse-version-manifest.outputs.version != ''
    steps:
      - name: Create and push parent tag
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}  # or use MY_GH_PAT
          TARGET_REPO: ${{ github.repository }}  # Current repository
          TAG_NAME: "${{ needs.parse-version-manifest.outputs.version }}"
        run: |
          set -e

          echo "Getting latest commit SHA from main branch..."
          COMMIT_SHA=$(curl -s \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${TARGET_REPO}/git/refs/heads/main \
            | jq -r '.object.sha')

          if [ "$COMMIT_SHA" = "null" ] || [ -z "$COMMIT_SHA" ]; then
            echo "❌ Failed to get commit SHA from main branch"
            exit 1
          fi

          echo "Latest commit SHA: $COMMIT_SHA"
          echo "Creating tag ${TAG_NAME} in repository ${TARGET_REPO}..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${TARGET_REPO}/git/refs \
          -d "{
            \"ref\": \"refs/tags/${TAG_NAME}\",
            \"sha\": \"$COMMIT_SHA\"
          }")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | head -n -1)  
          echo "HTTP Status: $HTTP_STATUS"          
          case $HTTP_STATUS in
            201)
              echo "✅ Tag ${TAG_NAME} created successfully!"
              ;;
            422)
              # Check if it's because tag already exists
              if echo "$RESPONSE_BODY" | jq -e '.message' | grep -q "already exists"; then
                echo "ℹ️ Tag ${TAG_NAME} already exists - moving on."
              else
                echo "❌ Failed to create tag: $(echo "$RESPONSE_BODY" | jq -r '.message')"
                exit 1
              fi
              ;;
            *)
              echo "❌ Unexpected error creating tag (HTTP $HTTP_STATUS)"
              echo "Response: $RESPONSE_BODY"
              exit 1
              ;;
          esac
        
          echo "✅ ${TARGET_REPO} tagged successfully with tag ${TAG_NAME}!"
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: tag-parent  # Only run after tagging is complete
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: false
        
    - name: Create VERSION file
      run: |
        echo "${GITHUB_REF#refs/tags/}" > VERSION
        cat VERSION
    
    - name: Download dependencies
      run: go mod download
      
    - name: Run unit tests
      run: make test-unit
      
    - name: Run functional tests
      run: make test-functional

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test  # Only run after tests pass
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: false
    - name: Create VERSION file
      run: echo "${GITHUB_REF#refs/tags/}" > VERSION
    
    - name: Download dependencies
      run: go mod download
      
    - name: Build binaries for all platforms
      run: make build-all
      
    - name: Generate checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        cat checksums.txt
      
    - name: Create initial release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Changes
          - Automated release from tag ${{ github.ref_name }}
          ```
        draft: true
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artifacts-${{ github.ref_name }}
        path: dist/
        retention-days: 30

  trigger-depencies-workflows:
    runs-on: ubuntu-latest
    needs: [build, parse-version-manifest]
    if: needs.parse-version-manifest.outputs.dependencies != ''
    strategy:
      matrix:
        dependency: ${{ fromJson(needs.parse-version-manifest.outputs.dependencies) }}
    steps:
      # - name: Invoke release workflow in dependency repository
      #   uses: the-actions-org/workflow-dispatch@v4
      #   with:
      #     token: ${{ secrets.MY_GITHUB_TOKEN }}
      #     repo: ${{ matrix.dependency.repo }}
      #     workflow: parent-release.yaml
      
      - name: Trigger release workflow in dependency repository
        id: trigger-dependency
        uses: the-actions-org/workflow-dispatch@v4
        env:
          RUN_NAME: >-
            Update External Repo ${{ github.repository }}
            [Run ID: ${{ github.run_id }}]
        with:
          workflow: ${{ env.DEPENDENCY_WORKFLOW }}
          ref: ${{ matrix.dependency.version }}
          repo: ${{ matrix.dependency.repo }}
          token: ${{ matrix.dependency.repo }}
          run-name: ${{ env.RUN_NAME }}
          inputs: >-
            {
              "run-name": "${{ env.RUN_NAME }}",
              "trigger-id": "${{ github.run_id }}"
            }
          display-workflow-run-url-interval: 10s
          display-workflow-run-url-timeout: 2m
          wait-for-completion-interval: 30s
          wait-for-completion-timeout: 20m
          workflow-logs: json-output