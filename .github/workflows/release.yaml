name: Create Release
on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        
    - name: Create VERSION file
      run: |
        echo "${GITHUB_REF#refs/tags/}" > VERSION
        cat VERSION
      
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
      
    - name: Run unit tests
      run: make test-unit
      
    - name: Run functional tests
      run: make test-functional

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test  # Only run after tests pass
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        
    - name: Create VERSION file
      run: echo "${GITHUB_REF#refs/tags/}" > VERSION
      
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
      
    - name: Build binaries for all platforms
      run: make build-all
      
    - name: Show binary sizes
      run: make size
      
    - name: Generate checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        cat checksums.txt
      
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Changes
          - Automated release from tag ${{ github.ref_name }}
          
          ### Binary Checksums
          ```
          $(cat dist/checksums.txt)
          ```
          
          ### Installation
          Download the appropriate binary for your platform:
          - **Linux AMD64**: `echo-linux-amd64`
          - **Linux ARM64**: `echo-linux-arm64`  
          - **Windows AMD64**: `echo-windows-amd64.exe`
          - **macOS AMD64**: `echo-darwin-amd64`
          - **macOS ARM64**: `echo-darwin-arm64`
          
          Make the binary executable (Linux/macOS):
          ```bash
          chmod +x echo-*
          ```
        draft: true
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ github.ref_name }}
        path: dist/
        retention-days: 30