name: Create Release
on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true
        
    - name: Create VERSION file
      run: |
        echo "${GITHUB_REF#refs/tags/}" > VERSION
        cat VERSION
    
    - name: Download dependencies
      run: go mod download
      
    - name: Run unit tests
      run: make test-unit
      
    - name: Run functional tests
      run: make test-functional

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test  # Only run after tests pass
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        cache: false
        go-version: '1.24'
        
    - name: Create VERSION file
      run: echo "${GITHUB_REF#refs/tags/}" > VERSION
    
    - name: Download dependencies
      run: go mod download
      
    - name: Build binaries for all platforms
      run: make build-all
      
    - name: Show binary sizes
      run: make size
      
    - name: Generate checksums
      run: |
        cd dist
        sha256sum * > checksums.txt
        cat checksums.txt
      
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Changes
          - Automated release from tag ${{ github.ref_name }}
          
          ### Binary Checksums
          ```
          $(cat dist/checksums.txt)
          ```
          
          ### Installation
          Download the appropriate binary for your platform:
          - **Linux AMD64**: `echo-linux-amd64`
          - **Linux ARM64**: `echo-linux-arm64`  
          - **Windows AMD64**: `echo-windows-amd64.exe`
          - **macOS AMD64**: `echo-darwin-amd64`
          - **macOS ARM64**: `echo-darwin-arm64`
          
          Make the binary executable (Linux/macOS):
          ```bash
          chmod +x echo-*
          ```
        draft: true
        prerelease: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artifacts-${{ github.ref_name }}
        path: dist/
        retention-days: 30

  trigger-child-repo:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
    - name: Trigger secondary repository workflow
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.MY_GITHUB_TOKEN }}
        repository: gntouts/release-action-child1
        event-type: triggered-by-${{ github.run_id }}
        client-payload: |
          {
            "main_repo": "${{ github.repository }}",
            "main_run_id": "${{ github.run_id }}",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "callback_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }

  wait-for-secondary:
    needs: [trigger-child-repo]
    runs-on: ubuntu-latest
    timeout-minutes: 29
    
    steps:
      - name: Wait
        id: wait
        uses: gntouts/wait-external-workflow@v1.0.0
        with:
          github_token: ${{ secrets.MY_GITHUB_TOKEN }}
          target_repo: gntouts/release-action-child1
          parent_run_id: ${{ github.run_id }}
          timeout: 5
      - name: Log wait results
        run: |
          echo "Result: ${{ steps.wait.outputs.result }}"
          echo "Secondary Run ID: ${{ steps.wait.outputs.child_run_id }}"

      - name: Fetch Child Repo Artifacts
        if: steps.wait.outputs.result == 'success'
        uses: actions/download-artifact@v4
        with:
          repository: gntouts/release-action-child1
          github-token: ${{ secrets.MY_GITHUB_TOKEN }}
          merge-multiple: true
          path: '${{ github.workspace }}/child-artifacts'
          run-id: ${{ steps.wait.outputs.child_run_id }}
      - name: List Child Artifacts
        run: |
          echo "Child artifacts:"
          ls -l "${{ github.workspace }}/child-artifacts"