name: Create Release
on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for git describe
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'  # Adjust to your preferred Go version
        
    - name: Create VERSION file
      run: echo "${GITHUB_REF#refs/tags/}" > VERSION
      
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
      
    - name: Run unit tests
      run: make test-unit
      
    - name: Run functional tests
      run: make test-functional
      